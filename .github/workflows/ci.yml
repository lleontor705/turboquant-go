name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Go ${{ matrix.go }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        go: ['1.24', '1.23']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test (race)
        if: runner.os != 'Windows'
        run: go test -race ./...

      - name: Go test (no race)
        if: runner.os == 'Windows'
        run: go test ./...
