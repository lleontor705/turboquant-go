name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Go ${{ matrix.go }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ['1.24', '1.23']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        if: runner.os != 'Windows'
        run: go test -race -count=1 ./...

      - name: Test
        if: runner.os == 'Windows'
        run: go test -count=1 ./...

  security:
    uses: lleontor705/ats-deploy/.github/workflows/security-scan.yml@main
